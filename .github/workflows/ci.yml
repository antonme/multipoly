name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Honor the package.json engines floor (>=18) plus the active LTS lines.
        node: [18, 20, 22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Health check (config loads + server boots)
        run: MULTIPOLY_GLM_API_KEY=dummy npm run health
